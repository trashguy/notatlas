# Dev infrastructure for notatlas services. Run via:
#   make nats-up    / make nats-down    / make nats-logs
#   make pg-up      / make pg-down      / make pg-logs
#   make services-up  (brings up both)
#
# Single-node NATS (JetStream on host port 4222 / monitor 8222) and
# single-node Postgres (host port 5432). Both standalone — sharing
# infrastructure with fallen-runes is forbidden per docs/08 §4.
#
# Persistent volumes survive container restarts during dev iteration.
# Wipe with `podman volume rm notatlas_nats_data notatlas_pg_data` for
# a clean slate.
services:
  nats:
    image: docker.io/nats:2.14
    container_name: notatlas-nats
    command:
      - "--name=notatlas-dev"
      - "--http_port=8222"
      - "--jetstream"
      - "--store_dir=/data/jetstream"
    # Host networking so we don't depend on rootless pasta /
    # slirp4netns being functional. The Makefile recipe matches.
    # If you need port isolation later, switch back to:
    #   ports: ["4222:4222", "8222:8222"]
    network_mode: host
    volumes:
      - notatlas_nats_data:/data
    restart: unless-stopped

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: notatlas-pg
    environment:
      POSTGRES_USER: notatlas
      POSTGRES_PASSWORD: notatlas
      POSTGRES_DB: notatlas
    network_mode: host
    volumes:
      - notatlas_pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    restart: unless-stopped

volumes:
  notatlas_nats_data:
  notatlas_pg_data:
