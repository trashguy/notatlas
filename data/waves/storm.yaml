# Storm wave kernel: real chop. Lower iterations (=20) keeps high-octave
# averaging from blunting the peaks; bigger amplitude_m and tighter
# wave_scale_m put visible 4-6m crests within camera frame; higher drag
# pulls subsequent octaves around for a non-uniform surface.
seed: 1003
iterations: 20
drag_multiplier: 0.50
amplitude_m: 8.0
wave_scale_m: 14.0
frequency_mult: 1.18
base_time_mult: 2.0
time_mult: 1.07
weight_decay: 0.8
